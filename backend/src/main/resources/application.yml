spring:
  application:
    name: freeze-dance-api

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/freezedance?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:FreezeDanceSecretKeyForJWTTokenGeneration2026MustBeAtLeast256BitsLong}
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_xxxxx}
    key-secret: ${RAZORPAY_KEY_SECRET:xxxxx}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
